server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow up to 50 MB per request — needed for multi-photo uploads
    client_max_body_size 50M;

    # ── API proxy → FastAPI backend ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8001/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # SSE (Server-Sent Events) — must disable buffering
        proxy_set_header   Connection        '';
        proxy_read_timeout 600s;
        proxy_buffering    off;
        proxy_cache        off;
        add_header         X-Accel-Buffering no;
    }

    # ── Uploaded images proxy → backend static files ─────────────────────────
    location /uploads/ {
        proxy_pass       http://backend:8001/uploads/;
        proxy_set_header Host $host;
    }

    # ── React SPA fallback ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
